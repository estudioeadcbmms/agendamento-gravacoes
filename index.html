<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agenda CFS 2026</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#020617;
--card:#ffffff;
--primary:#2563eb;
--primaryHover:#1d4ed8;
--danger:#dc2626;
--success:#10b981;
--warning:#f59e0b;
--border:#e5e7eb;
}

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#020617,#020617 40%,#0f172a);
color:white;
padding:20px;
}

h1{
text-align:center;
font-weight:700;
letter-spacing:0.3px;
margin-bottom:30px;
}

.card{
background:var(--card);
color:#111;
padding:25px;
border-radius:16px;
max-width:1100px;
margin:20px auto;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

#calendar{
max-width:1100px;
margin:auto;
}

#painel{
max-height:420px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#020617;
color:white;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid var(--border);
}

tr:hover{
background:#f9fafb;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
color:white;
}

.agendada{ background:var(--warning); }
.finalizada{ background:var(--success); }

button{
background:var(--primary);
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:600;
transition:0.2s;
}

button:hover{
background:var(--primaryHover);
}

.btnDelete{
background:var(--danger);
}

.btnDelete:hover{
background:#b91c1c;
}

select,input{
padding:10px;
border-radius:8px;
border:1px solid var(--border);
width:100%;
margin-bottom:14px;
}

.range{
accent-color:var(--primary);
}

#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

#modalContent{
background:white;
color:black;
padding:25px;
border-radius:14px;
width:380px;
}

.alert{
padding:10px;
border-radius:8px;
font-size:13px;
margin-bottom:10px;
}

.erro{
background:#fee2e2;
color:#991b1b;
}

.ok{
background:#dcfce7;
color:#166534;
}

.fc-daygrid-event{
border-radius:6px;
font-size:12px;
padding:3px 5px;
}

.fc-day-today{
background:#e0f2fe !important;
}

.dia-bloqueado{
background:#f1f5f9 !important;
opacity:0.4;
pointer-events:none;
}

.feriado{
background:#fee2e2 !important;
color:#991b1b !important;
font-weight:600;
}

</style>

</head>

<body>

<h1>Agenda de Gravações CFS 2026</h1>

<div class="card">

<button id="login">Entrar com Google</button>

<p id="statusLogin"></p>

</div>

<div class="card">

<div id="calendar"></div>

</div>

<div class="card">

<h3>Status das gravações</h3>

<div id="painel"></div>

</div>

<div id="modal">

<div id="modalContent">

<h3>Novo Agendamento</h3>

<div id="mensagem"></div>

<label>Matéria</label>
<select id="materia"></select>

<label>Instrutor</label>
<input id="instrutor" placeholder="Nome do instrutor">

<label>Período</label>
<select id="periodo">
<option value="manha">Manhã (07:00 às 12:00)</option>
<option value="tarde">Tarde (13:00 às 17:00)</option>
</select>

<label>Início</label>
<input type="range" id="inicioRange" class="range" step="15">

<label>Fim</label>
<input type="range" id="fimRange" class="range" step="15">

<p id="horarioEscolhido"></p>

<button onclick="salvar()">Salvar</button>
<button onclick="fechar()">Cancelar</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";

import{
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

import{
getFirestore,
collection,
addDoc,
doc,
updateDoc,
onSnapshot
}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDYs6XGy90jwbZqHLsmJ_GPYiiQbarXd-c",
authDomain:"cfs-2026.firebaseapp.com",
projectId:"cfs-2026",
storageBucket:"cfs-2026.firebasestorage.app",
messagingSenderId:"1065046463895",
appId:"1:1065046463895:web:14f86d3e9ed228a192e0d2"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let currentUser=null;
let isAdmin=false;
let dataSelecionada="";
let listaGlobal=[];

const ADMIN_EMAIL="estudioeadcbmms@gmail.com";

const DATA_INICIO_PERMITIDA="2026-04-01";
const DATA_FIM_PERMITIDA="2026-04-30";

const FERIADOS=["2026-04-02","2026-04-03","2026-04-20","2026-04-21"];

const MATERIAS=[

"Administração Bombeiro Militar - I",
"Armamento Munição e Tiro - II",
"Atendimento com Produtos Perigosos - III",
"Ciências Aplicadas a Atividade BM - II",
"Combate ao Racismo e Homofobia - III",
"Comunicações e Tecnologia da Informação - II",
"Defesa Civil - II",
"Direito Militar - I",
"Direitos Humanos - II",
"Educação Física Militar - III",
"Equipamento Motomecanizado - II",
"Informação e Contrainformação",
"Legislação Bombeiro Militar - III",
"Metodologia de Ensino - I",
"Ordem Unida - II",
"Prevenção e Proteção Contra Incêndio e Pânico - III",
"Psicologia das Emergências - II",
"Redação Oficial",
"Relação de Gênero - III",
"Relacionamento Interpessoal - III",
"Relações Humanas, Chefia e Liderança - I",
"Saúde e Segurança Aplicadas ao Trabalho - II",
"Sistema de Comando de Incidentes - III",
"Tática de Atendimento Pré-Hospitalar",
"Tática de Busca e Salvamento em Cobertura Vegetal de Risco",
"Tática de Combate a Incêndio Florestal",
"Tática de Combate a Incêndio Urbano",
"Tática de Salvamento Aquático",
"Tática de Salvamento em Altura",
"Tática de Salvamento Terrestre"

].sort();

const selectMateria=document.getElementById("materia");

MATERIAS.forEach(m=>{
let o=document.createElement("option");
o.value=m;
o.text=m;
selectMateria.appendChild(o);
});

document.getElementById("login").onclick=
()=>signInWithPopup(auth,provider);

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,user=>{

currentUser=user;
isAdmin=user?.email===ADMIN_EMAIL;

document.getElementById("statusLogin").innerHTML=
user?
`${user.email}<br><button onclick="logout()">Sair</button>`
:"";

});

function minParaHora(m){
let h=Math.floor(m/60);
let mm=m%60;
return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0");
}

function conflitoHorario(novo){

return listaGlobal.some(a=>{

if(a.data!==novo.data) return false;

return(
novo.inicio < a.fim &&
novo.fim > a.inicio &&
a.status!=="excluido"
);

});

}

function msg(texto,tipo="erro"){
document.getElementById("mensagem").innerHTML=
`<div class="alert ${tipo}">${texto}</div>`;
}

window.salvar=async()=>{

let instrutor=document.getElementById("instrutor").value.trim();

if(!instrutor)
return msg("Informe o instrutor");

let novo={
data:dataSelecionada,
materia:selectMateria.value,
instrutor,
inicio:parseInt(inicioRange.value),
fim:parseInt(fimRange.value),
status:"agendada"
};

if(conflitoHorario(novo))
return msg("Conflito de horário");

await addDoc(collection(db,"agendamentos"),novo);

msg("Salvo com sucesso","ok");

setTimeout(fechar,800);

};

window.fechar=()=>{
document.getElementById("modal").style.display="none";
document.getElementById("mensagem").innerHTML="";
};

function abrir(data){

if(!currentUser) return alert("faça login");

let diaSemana=new Date(data+"T00:00:00").getDay();

if(diaSemana===0 || diaSemana===6)
return alert("fim de semana bloqueado");

if(data<DATA_INICIO_PERMITIDA || data>DATA_FIM_PERMITIDA)
return alert("somente abril");

if(FERIADOS.includes(data))
return alert("feriado");

dataSelecionada=data;

document.getElementById("modal").style.display="flex";

}
const calendar=new FullCalendar.Calendar(

document.getElementById("calendar"),

{

locale:"pt-br",

dateClick:e=>abrir(e.dateStr),

dayCellDidMount:info=>{

let d=info.date.toISOString().split("T")[0];
let diaSemana=info.date.getDay();

if(diaSemana===0 || diaSemana===6){

info.el.classList.add("dia-bloqueado");

}

if(d<DATA_INICIO_PERMITIDA || d>DATA_FIM_PERMITIDA){

info.el.classList.add("dia-bloqueado");

}

if(FERIADOS.includes(d)){

info.el.classList.add("feriado");

}

},

events:(info,success)=>{

let eventos=listaGlobal.map(a=>({

title:a.materia,
start:a.data,
color:a.status==="finalizada"?"#10b981":"#2563eb"

}));

success(eventos);

}

}

);

calendar.render();

onSnapshot(collection(db,"agendamentos"),snapshot=>{

listaGlobal=[];

snapshot.forEach(d=>{

let a={id:d.id,...d.data()};

if(
a.data>=DATA_INICIO_PERMITIDA &&
a.data<=DATA_FIM_PERMITIDA &&
a.status!=="excluido"
)
listaGlobal.push(a);

});

listaGlobal.sort((a,b)=>a.data.localeCompare(b.data));

renderTabela();

calendar.refetchEvents();

});

function renderTabela(){

let html="<table>";

html+=`
<tr>
<th>Matéria</th>
<th>Instrutor</th>
<th>Data</th>
<th>Horário</th>
<th>Status</th>
<th></th>
</tr>
`;

listaGlobal.forEach(a=>{

html+=`

<tr>

<td>${a.materia}</td>

<td>${a.instrutor}</td>

<td>${a.data.split("-").reverse().join("/")}</td>

<td>${minParaHora(a.inicio)} - ${minParaHora(a.fim)}</td>

<td><span class="status ${a.status}">${a.status}</span></td>

<td>

${isAdmin?`

<button onclick="finalizar('${a.id}')">✔</button>

<button class="btnDelete" onclick="excluir('${a.id}')">🗑</button>

`:"-"}

</td>

</tr>

`;

});

html+="</table>";

document.getElementById("painel").innerHTML=html;

}

window.finalizar=id=>
updateDoc(doc(db,"agendamentos",id),{status:"finalizada"});

window.excluir=id=>
updateDoc(doc(db,"agendamentos",id),{status:"excluido"});

const inicioRange=document.getElementById("inicioRange");
const fimRange=document.getElementById("fimRange");

function configurarPeriodo(){

if(periodo.value==="manha"){

inicioRange.min=420;
inicioRange.max=720;

fimRange.min=420;
fimRange.max=720;

inicioRange.value=420;
fimRange.value=720;

}else{

inicioRange.min=780;
inicioRange.max=1020;

fimRange.min=780;
fimRange.max=1020;

inicioRange.value=780;
fimRange.value=1020;

}

atualizarRange();

}

function atualizarRange(){

let inicio=parseInt(inicioRange.value);
let fim=parseInt(fimRange.value);

if(inicio>=fim){

fim=inicio+15;
fimRange.value=fim;

}

horarioEscolhido.innerText=
minParaHora(inicio)+" até "+minParaHora(fim);

}

periodo.onchange=configurarPeriodo;

inicioRange.oninput=atualizarRange;
fimRange.oninput=atualizarRange;

configurarPeriodo();

</script>

</body>

</html>
