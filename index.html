<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento de Gravações CFS - 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body { 
      font-family: Arial; 
      margin: 0; 
      background:#0f172a; 
      color:white; 
      padding: 20px;
    }
    h2 { text-align:center; margin: 30px 0 10px; }
    #calendar { 
      max-width: 900px; 
      margin: 0 auto; 
      background:white; 
      color:black; 
      padding:15px; 
      border-radius:10px;
    }
    #painel { 
      max-width: 1100px; 
      margin: 30px auto; 
      background:white; 
      color:black; 
      padding:15px; 
      border-radius:10px; 
      overflow-y: auto; 
      height: 480px; 
      font-size: 1.4em;
    }
    table { width:100%; border-collapse: collapse; }
    th, td { 
      border: 1px solid #ddd; 
      padding: 12px; 
      text-align: left; 
    }
    th { 
      background: #0f172a; 
      color: white; 
    }
    .status { 
      padding: 8px 12px; 
      border-radius: 8px; 
      color: white; 
      font-weight: bold;
    }
    button { 
      background: #0f172a; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer;
    }
    button:hover { background: #1e40af; }
    button:disabled { background: #666; cursor: not-allowed; }
    #auth-section { text-align:center; margin:20px; padding:15px; background:#1e293b; border-radius:10px; }
    #google-login-btn { 
      background:#4285F4; 
      color:white; 
      padding:12px 24px; 
      font-size:1.1em; 
      border:none; 
      border-radius:5px; 
      cursor:pointer; 
    }
    #auth-status { margin-top:15px; font-weight:bold; }
  </style>
</head>
<body>

<h2>Agendamento de Gravações CFS - 2026</h2>

<div id="auth-section">
  <h3>Área de Administração</h3>
  <button id="google-login-btn">Entrar com Google</button>
  <p id="auth-status"></p>
</div>

<div id="calendar"></div>

<h2>Painel de Status das Gravações</h2>
<div id="painel"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDYs6XGy90jwbZqHLsmJ_GPYiiQbarXd-c",
    authDomain: "cfs-2026.firebaseapp.com",
    projectId: "cfs-2026",
    storageBucket: "cfs-2026.firebasestorage.app",
    messagingSenderId: "1065046463895",
    appId: "1:1065046463895:web:14f86d3e9ed228a192e0d2",
    measurementId: "G-2PBTJ0S516"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// variáveis globais
let currentUser = null;
let isAdmin = false;

const MEU_EMAIL = 'estudioeadcbmms@gmail.com';

onAuthStateChanged(auth, (user) => {
  currentUser = user;

  const statusEl = document.getElementById('auth-status');
  const btn = document.getElementById('google-login-btn');

  if (user) {

    isAdmin = user.email === MEU_EMAIL;

    statusEl.innerHTML = `
      Logado como: ${user.displayName || user.email}
      <button onclick="logout()" style="margin-left:10px; background:#db4437;">Sair</button>
    `;

    if (isAdmin) {
      statusEl.innerHTML += "<br><small>Você é administrador</small>";
    }

    btn.style.display = "none";

  } else {

    isAdmin = false;
    statusEl.textContent = "Faça login com Google";
    btn.style.display = "inline-block";

  }

  renderPainel();
});

  window.loginWithGoogle = async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (error) {
      document.getElementById('auth-status').textContent = 'Erro ao entrar: ' + error.message;
    }
  };

  window.logout = () => {
    signOut(auth);
  };

  document.getElementById('google-login-btn').addEventListener('click', loginWithGoogle);

  function definirPeriodo(hora){
    if(hora >= 7 && hora < 12) return {inicio:"07:00", fim:"12:00", periodo:"manha"};
    if(hora >= 13 && hora < 17) return {inicio:"13:30", fim:"17:00", periodo:"tarde"};
    return null;
  }

  function formatarData(dataStr) {
    const date = new Date(dataStr);
    return date.toLocaleDateString('pt-BR');
  }

  async function renderPainel() {
    const snapshot = await getDocs(collection(db, "agendamentos"));
    let html = `<table>
      <thead><tr>
          <th>Matéria</th><th>Instrutor</th><th>Data</th><th>Horário</th><th>Status</th><th>Ação</th>
      </tr></thead><tbody>`;

    const lista = [];
    snapshot.forEach(docSnap => {
      lista.push({id: docSnap.id, ...docSnap.data()});
    });

    lista.sort((a,b) => a.data.localeCompare(b.data));

    lista.forEach(item => {
      const status = item.status || "agendada";
      const cor = status === "finalizada" ? "green" : "orange";
      const instrutor = item.instrutor || "Não informado";
      const materia = item.materia || "Sem matéria";

      const botaoFinalizar = isAdmin 
        ? `<button onclick="markFinalizada('${item.id}')">Finalizar</button>`
        : `<button disabled>Finalizar</button>`;

      html += `<tr>
          <td>${materia}</td>
          <td>${instrutor}</td>
          <td>${formatarData(item.data)}</td>
          <td>${item.inicio} - ${item.fim}</td>
          <td><span class="status" style="background:${cor};">${status.toUpperCase()}</span></td>
          <td>${botaoFinalizar}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('painel').innerHTML = html || "<p style='text-align:center; color:#666;'>Nenhuma gravação agendada ainda.</p>";

    startAutoScroll(document.getElementById('painel'));
  }

  window.markFinalizada = async (id) => {
    if (!currentUser || !isAdmin) {
      alert("Apenas Gilberto logado pode marcar como finalizada.");
      return;
    }
    if (confirm("Marcar esta gravação como FINALIZADA?")) {
      try {
        const docRef = doc(db, "agendamentos", id);
        await updateDoc(docRef, { status: "finalizada" });
        alert("✅ Finalizada!");
        renderPainel();
      } catch (err) {
        alert("Erro: " + err.message);
      }
    }
  };

  let scrollInterval;
  function startAutoScroll(painelDiv) {
    clearInterval(scrollInterval);
    scrollInterval = setInterval(() => {
      if (painelDiv.scrollHeight > painelDiv.clientHeight) {
        painelDiv.scrollTop += 1.5;
        if (painelDiv.scrollTop + painelDiv.clientHeight >= painelDiv.scrollHeight - 10) {
          painelDiv.scrollTop = 0;
        }
      }
    }, 80);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      locale: 'pt-br',

      dateClick: async function(info) {
        if (!currentUser) {
          alert("Faça login com Google para agendar gravações!");
          return;
        }

        let hora = prompt("Digite a hora (ex: 9 ou 14)");
        if(!hora) return;
        hora = parseInt(hora);

        const periodoInfo = definirPeriodo(hora);
        if(!periodoInfo){
          alert("Horário inválido! Use 7-11 ou 13-16.");
          return;
        }

        const materia = prompt("Digite o nome da MATÉRIA:");
        if(!materia) return;

        const instrutor = prompt("Digite o nome do INSTRUTOR (pode deixar em branco):") || "Não informado";

        const data = info.dateStr;

        const qCheck = query(
          collection(db, "agendamentos"),
          where("data", "==", data),
          where("periodo", "==", periodoInfo.periodo)
        );
        const checkSnap = await getDocs(qCheck);
        if (!checkSnap.empty) {
          alert("Esse período já está ocupado por outra matéria!");
          return;
        }

        if(confirm(`Matéria: ${materia}\nInstrutor: ${instrutor}\nHorário: ${periodoInfo.inicio} até ${periodoInfo.fim}\n\nConfirmar agendamento?`)){
          try {
            await addDoc(collection(db, "agendamentos"), {
              data: data,
              periodo: periodoInfo.periodo,
              inicio: periodoInfo.inicio,
              fim: periodoInfo.fim,
              materia: materia,
              instrutor: instrutor,
              status: "agendada"
            });
            alert("✅ Agendado com sucesso!");
            location.reload();
          } catch (err) {
            alert("Erro ao salvar: " + err.message);
          }
        }
      },

      events: async function(fetchInfo, successCallback) {
        const snapshot = await getDocs(collection(db, "agendamentos"));
        const eventos = [];
        snapshot.forEach(docSnap => {
          const d = docSnap.data();
          const status = d.status || "agendada";
          eventos.push({
            title: (d.materia || 'Sem matéria') + " - " + d.periodo.toUpperCase(),
            start: d.data,
            color: status === "finalizada" ? "#28a745" : (d.periodo === "manha" ? "#fd7e14" : "#007bff")
          });
        });
        successCallback(eventos);
      }
    });

    calendar.render();
    renderPainel();
    setInterval(renderPainel, 60000);
  });
</script>

</body>
</html>
