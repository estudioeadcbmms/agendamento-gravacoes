// ==================== CORREÇÃO AQUI ====================

function abrir(data){
    const d = new Date(data);
    const diaSemana = d.getDay();   // 0=Domingo, 6=Sábado

    // Bloqueia sábado e domingo
    if(diaSemana === 0 || diaSemana === 6){
        alert("Fim de semana bloqueado! Apenas segunda a sexta são permitidas.");
        return;
    }

    if(FERIADOS.includes(data)){
        alert("Feriado ou ponto facultativo bloqueado.");
        return;
    }

    if(data < DATA_INICIO_PERMITIDA || data > DATA_FIM_PERMITIDA){
        alert("Agendamentos permitidos apenas em Abril/2026.");
        return;
    }

    dataSelecionada = data;
    document.getElementById("modal").style.display = "flex";
}

// ==================== CORREÇÃO NO CALENDÁRIO ====================

const calendar = new FullCalendar.Calendar(
    document.getElementById("calendar"),
    {
        locale: "pt-br",
        dateClick: e => abrir(e.dateStr),

        dayCellDidMount: info => {
            const dataStr = info.date.toISOString().split("T")[0];
            const diaSemana = info.date.getDay();

            // Bloqueia sábado e domingo visualmente
            if(diaSemana === 0 || diaSemana === 6){
                info.el.classList.add("fimSemana");
            }

            // Bloqueia dias fora de abril/2026
            if(dataStr < DATA_INICIO_PERMITIDA || dataStr > DATA_FIM_PERMITIDA){
                info.el.classList.add("dia-bloqueado");
            }

            if(FERIADOS.includes(dataStr)){
                info.el.classList.add("feriado");
            }
        },

        events: (info, success) => {
            onSnapshot(collection(db,"agendamentos"), snapshot => {
                let eventos = [];
                snapshot.forEach(doc => {
                    const a = doc.data();
                    if(
                        a.data >= DATA_INICIO_PERMITIDA &&
                        a.data <= DATA_FIM_PERMITIDA &&
                        a.status !== "excluido"
                    ){
                        eventos.push({
                            title: a.materia,
                            start: a.data,
                            color: corDaMateria(a.materia)
                        });
                    }
                });
                success(eventos);
            });
        }
    }
);
