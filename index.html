<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Agendamento de Gravações CFS - 2026</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(180deg,#020617,#020617 40%,#0f172a);
color:white;
padding:30px;
}

h2{
text-align:center;
font-weight:600;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:18px;
max-width:950px;
margin:25px auto;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

#calendar{
max-width:950px;
margin:auto;
}

#painel{
max-width:1100px;
margin:auto;
max-height:460px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#020617;
color:white;
padding:14px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.fimSemana{
background:#f1f5f9 !important;
color:#94a3b8 !important;
}

.feriado{
background:#fee2e2 !important;
color:#991b1b !important;
font-weight:600;
}

</style>

</head>

<body>

<h2>Agendamento de Gravações CFS - 2026</h2>

<div class="card">

<button id="login">Entrar com Google</button>

<p id="statusLogin"></p>

</div>

<div class="card">

<div id="calendar"></div>

</div>

<h2>Painel de Status das Gravações</h2>

<div class="card" id="painel"></div>


<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";

import{

getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged

}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

import{

getFirestore,
collection,
onSnapshot

}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDYs6XGy90jwbZqHLsmJ_GPYiiQbarXd-c",
authDomain:"cfs-2026.firebaseapp.com",
projectId:"cfs-2026"

};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

const DATA_INICIO="2026-04-01";
const DATA_FIM="2026-04-30";

const FERIADOS=[
"2026-04-02",
"2026-04-03",
"2026-04-20",
"2026-04-21"
];

function corMateria(txt){

let hash=0;

for(let i=0;i<txt.length;i++){

hash=txt.charCodeAt(i)+((hash<<5)-hash);

}

return `hsl(${hash%360},65%,55%)`;

}

document.getElementById("login").onclick=()=>signInWithPopup(auth,provider);

let eventosFirebase=[];

onSnapshot(collection(db,"agendamentos"),snapshot=>{

eventosFirebase=[];

snapshot.forEach(doc=>{

const a=doc.data();

if(a.status!="excluido"){

eventosFirebase.push(a);

}

});

renderPainel();
calendar.refetchEvents();

});

function renderPainel(){

let html="<table>";

html+="<tr><th>Matéria</th><th>Instrutor</th><th>Data</th><th>Horário</th></tr>";

eventosFirebase
.sort((a,b)=>a.data.localeCompare(b.data))
.forEach(a=>{

html+=`

<tr>

<td style="color:${corMateria(a.materia)};font-weight:600">

${a.materia}

</td>

<td>${a.instrutor}</td>

<td>${a.data}</td>

<td>${a.inicio} - ${a.fim}</td>

</tr>

`;

});

html+="</table>";

document.getElementById("painel").innerHTML=html;

}

function dataLocal(date){

const off=date.getTimezoneOffset()*60000;

return new Date(date.getTime()-off).toISOString().split("T")[0];

}

const calendar=new FullCalendar.Calendar(

document.getElementById("calendar"),

{

locale:"pt-br",

events:(info,success)=>{

let lista=[];

eventosFirebase.forEach(a=>{

if(a.data>=DATA_INICIO && a.data<=DATA_FIM){

lista.push({

title:a.materia,
start:a.data,
color:corMateria(a.materia)

});

}

});

success(lista);

},

dayCellDidMount:info=>{

const dataStr=dataLocal(info.date);

const dia=info.date.getDay();

if(dia==0 || dia==6){

info.el.classList.add("fimSemana");

}

if(FERIADOS.includes(dataStr)){

info.el.classList.add("feriado");

}

}

}

);

calendar.render();

</script>

</body>

</html>
