<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Agendamento de Gravações CFS - 2026</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(180deg,#020617,#020617 40%,#0f172a);
color:white;
padding:30px;
}

h2{
text-align:center;
font-weight:600;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:18px;
max-width:950px;
margin:25px auto;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

#calendar{
max-width:950px;
margin:auto;
}

#painel{
max-width:1100px;
margin:auto;
max-height:460px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#020617;
color:white;
padding:14px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.status{
padding:6px 14px;
border-radius:20px;
color:white;
font-size:12px;
font-weight:600;
}

.agendada{
background:#f59e0b;
}

.finalizada{
background:#10b981;
}

button{
background:#2563eb;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
margin:2px;
font-size:13px;
}

.btnDelete{
background:#dc2626;
}

select,input{
padding:10px;
margin-top:6px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #d1d5db;
width:100%;
}

.range{
width:100%;
accent-color:#2563eb;
}

#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.55);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#modalContent{
background:white;
color:black;
padding:28px;
border-radius:16px;
width:380px;
}

.fimSemana{
background:#f1f5f9 !important;
color:#94a3b8 !important;
}

.feriado{
background:#fee2e2 !important;
color:#991b1b !important;
font-weight:600;
}

</style>

</head>


<body>


<h2>Agendamento de Gravações CFS - 2026</h2>


<div class="card">

<button id="login">Entrar com Google</button>

<p id="statusLogin"></p>

</div>


<div class="card">

<div id="calendar"></div>

</div>


<h2>Painel de Status das Gravações</h2>

<div class="card" id="painel"></div>



<div id="modal">

<div id="modalContent">


<h3>Novo Agendamento</h3>


<label>Matéria</label>

<select id="materia"></select>


<label>Instrutor</label>

<input id="instrutor">


<label>Período</label>

<select id="periodo">

<option value="manha">07:00 às 12:00</option>

<option value="tarde">13:00 às 17:00</option>

</select>


<label>Início</label>

<input type="range" id="inicioRange" step="15">


<label>Fim</label>

<input type="range" id="fimRange" step="15">


<p id="horarioEscolhido"></p>


<button onclick="salvar()">Salvar</button>

<button onclick="fechar()">Cancelar</button>


</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>


<script type="module">


import{initializeApp}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";

import{

getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut

}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

import{

getFirestore,
collection,
addDoc,
doc,
updateDoc,
onSnapshot

}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";



const firebaseConfig={

apiKey:"AIzaSyDYs6XGy90jwbZqHLsmJ_GPYiiQbarXd-c",
authDomain:"cfs-2026.firebaseapp.com",
projectId:"cfs-2026"

};



const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const provider=new GoogleAuthProvider();



let currentUser=null;
let dataSelecionada="";

const DATA_INICIO_PERMITIDA="2026-04-01";
const DATA_FIM_PERMITIDA="2026-04-30";

const FERIADOS=[

"2026-04-02",
"2026-04-03",
"2026-04-20",
"2026-04-21"

];



const MATERIAS=[

"Administração Bombeiro Militar - I",
"Armamento Munição e Tiro - II",
"Atendimento com Produtos Perigosos - III",
"Ciências Aplicadas a Atividade BM - II",
"Combate ao Racismo e Homofobia - III",
"Comunicações e Tecnologia da Informação - II",
"Defesa Civil - II",
"Direito Militar - I",
"Direitos Humanos - II",
"Educação Física Militar - III",
"Equipamento Motomecanizado - II",
"Informação e Contrainformação",
"Legislação Bombeiro Militar - III",
"Metodologia de Ensino - I",
"Ordem Unida - II",
"Prevenção e Proteção Contra Incêndio e Pânico - III",
"Psicologia das Emergências - II",
"Redação Oficial",
"Relação de Gênero - III",
"Relacionamento Interpessoal - III",
"Relações Humanas, Chefia e Liderança - I",
"Saúde e Segurança Aplicadas ao Trabalho - II",
"Sistema de Comando de Incidentes - III",
"Tática de Atendimento Pré-Hospitalar",
"Tática de Busca e Salvamento em Cobertura Vegetal de Risco",
"Tática de Combate a Incêndio Florestal",
"Tática de Combate a Incêndio Urbano",
"Tática de Salvamento Aquático",
"Tática de Salvamento em Altura",
"Tática de Salvamento Terrestre"

].sort();



const selectMateria=document.getElementById("materia");

MATERIAS.forEach(m=>{

const o=document.createElement("option");

o.value=m;
o.text=m;

selectMateria.appendChild(o);

});



function corDaMateria(txt){

let hash=0;

for(let i=0;i<txt.length;i++){

hash=txt.charCodeAt(i)+((hash<<5)-hash);

}

return `hsl(${hash%360},65%,55%)`;

}



onAuthStateChanged(auth,user=>{

currentUser=user;

document.getElementById("statusLogin").innerHTML=

user

?`${user.email}<br><button onclick="logout()">Sair</button>`

:"";

});


document.getElementById("login")

.onclick=()=>signInWithPopup(auth,provider);


window.logout=()=>signOut(auth);



function minParaHora(m){

let h=Math.floor(m/60);

let mm=m%60;

return String(h).padStart(2,"0")+":"+String(mm).padStart(2,"0");

}



const inicioRange=document.getElementById("inicioRange");
const fimRange=document.getElementById("fimRange");



function configurarPeriodo(){

if(document.getElementById("periodo").value=="manha"){

inicioRange.min=420;
inicioRange.max=720;
fimRange.min=420;
fimRange.max=720;
inicioRange.value=420;
fimRange.value=720;

}else{

inicioRange.min=780;
inicioRange.max=1020;
fimRange.min=780;
fimRange.max=1020;
inicioRange.value=780;
fimRange.value=1020;

}

}


document.getElementById("periodo").onchange=configurarPeriodo;

configurarPeriodo();



window.salvar=async()=>{

await addDoc(collection(db,"agendamentos"),{

data:dataSelecionada,
materia:selectMateria.value,
instrutor:document.getElementById("instrutor").value,
inicio:parseInt(inicioRange.value),
fim:parseInt(fimRange.value),
status:"agendada"

});

fechar();

};



window.fechar=()=>{

document.getElementById("modal").style.display="none";

};



function abrir(data){

const d=new Date(data);

const diaSemana=d.getDay();

if(diaSemana==0 || diaSemana==6){

alert("fim de semana bloqueado");

return;

}

if(FERIADOS.includes(data)){

alert("feriado");

return;

}

if(data < DATA_INICIO_PERMITIDA || data > DATA_FIM_PERMITIDA){

alert("apenas Abril");

return;

}

dataSelecionada=data;

document.getElementById("modal").style.display="flex";

}



function iniciarRealtime(){

onSnapshot(collection(db,"agendamentos"),snapshot=>{

let lista=[];

snapshot.forEach(d=>{

const a=d.data();

if(

a.data >= DATA_INICIO_PERMITIDA &&
a.data <= DATA_FIM_PERMITIDA &&
a.status!="excluido"

){

lista.push(a);

}

});


lista.sort((a,b)=>a.data.localeCompare(b.data));


let html="<table>";

html+="<tr><th>Matéria</th><th>Instrutor</th><th>Data</th><th>Horário</th></tr>";


lista.forEach(a=>{

html+=`

<tr>

<td style="color:${corDaMateria(a.materia)};font-weight:600">

${a.materia}

</td>

<td>${a.instrutor}</td>

<td>${a.data}</td>

<td>${minParaHora(a.inicio)} - ${minParaHora(a.fim)}</td>

</tr>

`;

});


html+="</table>";

document.getElementById("painel").innerHTML=html;

calendar.refetchEvents();

});

}



const calendar=new FullCalendar.Calendar(

document.getElementById("calendar"),

{

locale:"pt-br",

dateClick:e=>abrir(e.dateStr),


dayCellDidMount:info=>{

const d=info.date;

const diaSemana=d.getDay();

const dataStr=d.toISOString().split("T")[0];

if(diaSemana==0 || diaSemana==6){

info.el.classList.add("fimSemana");

}

if(FERIADOS.includes(dataStr)){

info.el.classList.add("feriado");

}

},


events:(info,success)=>{

onSnapshot(collection(db,"agendamentos"),snapshot=>{

let eventos=[];

snapshot.forEach(d=>{

const a=d.data();

eventos.push({

title:a.materia,
start:a.data,
color:corDaMateria(a.materia)

});

});

success(eventos);

});

}

}

);

calendar.render();

iniciarRealtime();


</script>


</body>

</html>
