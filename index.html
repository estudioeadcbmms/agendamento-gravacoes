<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Agendamento de Gravações CFS - 2026</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:linear-gradient(180deg,#020617,#020617 40%,#0f172a);
color:white;
padding:30px;
}

h2{text-align:center;}

.card{
background:white;
color:black;
padding:25px;
border-radius:18px;
max-width:950px;
margin:25px auto;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

#calendar{max-width:950px;margin:auto;}

#painel{
max-width:1100px;
margin:auto;
max-height:460px;
overflow:auto;
}

table{width:100%;border-collapse:collapse;font-size:14px;}

th{
background:#020617;
color:white;
padding:14px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
}

select,input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
}

.range{
width:100%;
accent-color:#2563eb;
}

#modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#modalContent{
background:white;
color:black;
padding:30px;
border-radius:16px;
width:420px;
}

.fimSemana{
background:#f1f5f9 !important;
color:#94a3b8 !important;
}

.feriado{
background:#fee2e2 !important;
color:#991b1b !important;
font-weight:600;
}

.dia-bloqueado{
background:#f8fafc !important;
opacity:0.4;
}

</style>

</head>


<body>

<h2>Agendamento de Gravações CFS - 2026</h2>

<div class="card">

<h3>Área de Administração</h3>

<button id="login">Entrar com Google</button>

<p id="statusLogin"></p>

</div>


<div class="card">

<div id="calendar"></div>

</div>


<h2>Painel de Status das Gravações</h2>

<div class="card" id="painel"></div>


<div id="modal">

<div id="modalContent">

<h3>Novo Agendamento</h3>

<label>Matéria</label>
<select id="materia"></select>

<label>Instrutor</label>
<input id="instrutor">

<label>Período</label>
<select id="periodo">
<option value="manha">07:00 às 12:00</option>
<option value="tarde">13:00 às 17:00</option>
</select>

<label>Início</label>
<input type="range" id="inicioRange" class="range" step="15">

<label>Fim</label>
<input type="range" id="fimRange" class="range" step="15">

<p id="horarioTexto"></p>

<button onclick="salvar()">Salvar</button>
<button onclick="fechar()">Cancelar</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";

import{
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

import{
getFirestore,
collection,
addDoc,
onSnapshot
}from"https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyDYs6XGy90jwbZqHLsmJ_GPYiiQbarXd-c",
authDomain:"cfs-2026.firebaseapp.com",
projectId:"cfs-2026"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

let dataSelecionada="";

const DATA_INICIO_PERMITIDA="2026-04-01";
const DATA_FIM_PERMITIDA="2026-04-30";

const FERIADOS=[
"2026-04-02",
"2026-04-03",
"2026-04-20",
"2026-04-21"
];

const MATERIAS=[ ... ].sort();


MATERIAS.forEach(m=>{
const opt=document.createElement("option");
opt.value=m;
opt.textContent=m;
document.getElementById("materia").appendChild(opt);
});


function corDaMateria(txt){

let hash=0;

for(let i=0;i<txt.length;i++){

hash=txt.charCodeAt(i)+((hash<<5)-hash);

}

return `hsl(${hash%360},65%,55%)`;

}


onAuthStateChanged(auth,user=>{

document.getElementById("statusLogin").innerHTML=
user
?`${user.email}<br><button onclick="logout()">Sair</button>`
:"";

});

document.getElementById("login").onclick=()=>signInWithPopup(auth,provider);
window.logout=()=>signOut(auth);



function minHora(min){

let h=Math.floor(min/60);
let m=min%60;

return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");

}


const inicioRange=document.getElementById("inicioRange");
const fimRange=document.getElementById("fimRange");


function ajustarPeriodo(){

if(document.getElementById("periodo").value==="manha"){

inicioRange.min=420;
inicioRange.max=720;

fimRange.min=420;
fimRange.max=720;

inicioRange.value=420;
fimRange.value=720;

}else{

inicioRange.min=780;
inicioRange.max=1020;

fimRange.min=780;
fimRange.max=1020;

inicioRange.value=780;
fimRange.value=1020;

}

mostrarHorario();

}


document.getElementById("periodo").onchange=ajustarPeriodo;


function mostrarHorario(){

let ini=parseInt(inicioRange.value);
let fim=parseInt(fimRange.value);

if(ini>=fim){

fim=ini+15;
fimRange.value=fim;

}

document.getElementById("horarioTexto").innerText=
minHora(ini)+" até "+minHora(fim);

}

inicioRange.oninput=mostrarHorario;
fimRange.oninput=mostrarHorario;

ajustarPeriodo();



window.salvar=async()=>{

await addDoc(collection(db,"agendamentos"),{

data:dataSelecionada,
materia:document.getElementById("materia").value,
instrutor:document.getElementById("instrutor").value,
inicio:parseInt(inicioRange.value),
fim:parseInt(fimRange.value),
status:"agendada"

});

fechar();

};



window.fechar=()=>{

document.getElementById("modal").style.display="none";

};



function abrir(data){

const d=new Date(data+"T00:00:00");
const dia=d.getDay();

if(dia===0||dia===6){

alert("fim de semana bloqueado");
return;

}

if(FERIADOS.includes(data)){

alert("feriado bloqueado");
return;

}

if(data<DATA_INICIO_PERMITIDA||data>DATA_FIM_PERMITIDA){

alert("somente abril permitido");
return;

}

dataSelecionada=data;

document.getElementById("modal").style.display="flex";

}



let listaEventos=[];


onSnapshot(collection(db,"agendamentos"),snap=>{

listaEventos=[];

snap.forEach(doc=>{

const a=doc.data();

if(a.status!=="excluido") listaEventos.push(a);

});

calendar.refetchEvents();
atualizarPainel();

});


function atualizarPainel(){

let html="<table>";

html+="<tr><th>Matéria</th><th>Instrutor</th><th>Data</th><th>Horário</th></tr>";

listaEventos
.sort((a,b)=>a.data.localeCompare(b.data))
.forEach(a=>{

html+=`

<tr>

<td style="color:${corDaMateria(a.materia)};font-weight:600">

${a.materia}

</td>

<td>${a.instrutor}</td>

<td>${a.data}</td>

<td>${minHora(a.inicio)} - ${minHora(a.fim)}</td>

</tr>

`;

});

html+="</table>";

document.getElementById("painel").innerHTML=html;

}



const calendar=new FullCalendar.Calendar(

document.getElementById("calendar"),

{

locale:"pt-br",

dateClick:e=>abrir(e.dateStr),


events:(info,success)=>{

let eventos=[];

listaEventos.forEach(a=>{

if(a.data>=DATA_INICIO_PERMITIDA&&a.data<=DATA_FIM_PERMITIDA){

eventos.push({

title:a.materia,
start:a.data,
color:corDaMateria(a.materia)

});

}

});

success(eventos);

},


dayCellDidMount:info=>{

const dataStr=info.date.toISOString().split("T")[0];
const dia=info.date.getDay();

if(dia===0||dia===6) info.el.classList.add("fimSemana");

if(dataStr<DATA_INICIO_PERMITIDA||dataStr>DATA_FIM_PERMITIDA)
info.el.classList.add("dia-bloqueado");

if(FERIADOS.includes(dataStr))
info.el.classList.add("feriado");

}

}

);

calendar.render();

</script>

</body>

</html>
